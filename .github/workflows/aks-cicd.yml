name: Build Push Deploy to AKS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: simple-cicd-app
  RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
  AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_TAG: ${{ github.sha }}

concurrency:
  group: aks-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Python app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required configuration
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          ACR_NAME: ${{ secrets.ACR_NAME }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          test -n "$AZURE_CREDENTIALS" || (echo "Missing AZURE_CREDENTIALS secret" && exit 1)
          test -n "$ACR_NAME" || (echo "Missing ACR_NAME secret" && exit 1)
          test -n "$ACR_LOGIN_SERVER" || (echo "Missing ACR_LOGIN_SERVER secret" && exit 1)

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required configuration
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
        run: |
          test -n "$AZURE_CREDENTIALS" || (echo "Missing AZURE_CREDENTIALS secret" && exit 1)
          test -n "$ACR_LOGIN_SERVER" || (echo "Missing ACR_LOGIN_SERVER secret" && exit 1)
          test -n "$AKS_RESOURCE_GROUP" || (echo "Missing AKS_RESOURCE_GROUP repository variable" && exit 1)
          test -n "$AKS_CLUSTER_NAME" || (echo "Missing AKS_CLUSTER_NAME repository variable" && exit 1)

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Update Kubernetes image
        run: |
          mkdir -p /tmp/k8s-rendered
          cp k8s/*.yaml /tmp/k8s-rendered/
          sed -i "s|REPLACE_WITH_ACR_LOGIN_SERVER/simple-cicd-app:latest|${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}|g" /tmp/k8s-rendered/deployment.yaml

      - name: Deploy manifests
        run: kubectl apply -f /tmp/k8s-rendered/

      - name: Verify rollout
        run: kubectl rollout status deployment/simple-cicd-app --timeout=120s
