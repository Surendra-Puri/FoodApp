apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-cicd-app
  labels:
    app: simple-cicd-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-cicd-app
  template:
    metadata:
      labels:
        app: simple-cicd-app
    spec:
      containers:
        - name: simple-cicd-app
          image: REPLACE_WITH_ACR_LOGIN_SERVER/simple-cicd-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
